<!-- Toggle button for switching between Form and raw JSON -->
<script>
  const toggleBtn = document.getElementById('toggleInputBtn');
  const formContainer = document.getElementById('formContainer');
  const jsonContainer = document.getElementById('jsonContainer');

  toggleBtn.addEventListener('click', () => {
    // Toggle visibility
    if (formContainer.style.display === 'none') {
      formContainer.style.display = 'block';
      jsonContainer.style.display = 'none';
    } else {
      formContainer.style.display = 'none';
      jsonContainer.style.display = 'block';
    }
  });
</script>

<!-- Image conversion into text (Base64) -->
<script>
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const imageText = document.getElementById('imageEncoded');

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        // Create a canvas to resize the image
        const canvas = document.createElement('canvas');
        canvas.width = 48;
        canvas.height = 48;
        const ctx = canvas.getContext('2d');

        // Draw the resized image onto canvas
        ctx.drawImage(img, 0, 0, 48, 48);

        // Convert the canvas to Base64 text
        const base64 = canvas.toDataURL(file.type); // e.g., data:image/png;base64,....

        // Display the Base64 text in the textarea
        imageText.value = base64;
      }
      img.src = e.target.result;
    }
    reader.readAsDataURL(file);
  });
</script>

<script>
  $('#assetTree').on('select_node.jstree', function (e, data) {
    if (data.node.children.length > 0) {
      // Not a leaf → deselect
      $('#assetTree').jstree(true).deselect_node(data.node);
      return;
    }
  
    // Leaf selected
    const selectedValue = data.node.id;
    document.getElementById('asset_type').value = selectedValue;
  });
</script>


<!-- Schema generation button behaviour -->
<script>
  document.getElementById("generateSchema").addEventListener("click", async () => {
    const assetType = document.getElementById("asset_type").value;
    const textarea = document.getElementById("semanticSchema");
    const textarea2 = document.getElementById("semanticSchema2");

    if (!assetType) {
      alert("Please select a semantic model from the tree first.");
      return;
    }

    // Build path directly from tree id
    // Example: id === "robot/mobile"
    // → ./schemas/robot/mobile.json
    const schemaPath = `./schemas/${assetType}.json`;

    try {
      textarea.value = "Loading schema...";

      const response = await fetch(schemaPath);
      if (!response.ok) {
        throw new Error(`Schema not found at ${schemaPath}`);
      }

      const schema = await response.json();
      const count1 = Object.keys(schema.mandatory).length;
      const count2 = Object.keys(schema.optional).length;
      // Pretty-print JSON into textarea
      textarea.value = JSON.stringify(schema.mandatory, null, 2);
      textarea2.value = JSON.stringify(schema.optional, null, 2);
      document.getElementById("semanticSchema").rows = count1 + 2;
      document.getElementById("semanticSchema2").rows = count2 + 2;

    } catch (error) {
      console.error(error);
      textarea.value = "";
      alert("Failed to load semantic schema.");
    }
  });
</script>


<!-- GUI Form submission handling -->
<script>
  document.getElementById('guiForm').addEventListener('submit', async (event) => {
    event.preventDefault(); // Prevent form from submitting normally
    
    const semantic_model1 = JSON.parse(document.getElementById('semanticSchema').value || "{}");
    const semantic_model2 = JSON.parse(document.getElementById('semanticSchema2').value || "{}");
    const semantic_model = { ...semantic_model1, ...semantic_model2 };
    const selectedOfferType = document.querySelector('input[name="submissionType"]:checked').value;

    const data = {
      // General Information
      kit_name: document.getElementById('kitName').value,
      kit_type: "basic",
      name: document.getElementById('kitName').value,
      version: document.getElementById('version').value,
      description: document.getElementById('description').value,
      tag: document.getElementById('tag').value || null,
      business: document.getElementById('businessValue').value || null,
      vision: document.getElementById('vision').value || null,
      license: document.getElementById('license').value || null,
      contact: document.getElementById('contact').value || null,
      offerType: selectedOfferType,
    
      // Semantic Model
      semantic_model: semantic_model,

      // asset representative image
      icon: document.getElementById('imageEncoded').value || null,
      
    };

    const selectedAssetType = document.querySelector('input[name="gridRadiosAsset"]:checked')?.value;

    let STATUS_URL;
    if (selectedAssetType === 'httpOption') {
      STATUS_URL = `${EDGE_CONNECTOR.ADDRESS}:${EDGE_CONNECTOR.PORT}/kit/basic/create/http`;
      Object.assign(data, {
        url: document.getElementById('httpUrl').value,
        asset_type: "http",
        method: document.getElementById('httpMethod').value,
        
        request_type: document.getElementById('httpRequestType').value,
        request_body: document.getElementById('httpRequestBody').value ? JSON.parse(document.getElementById('httpRequestBody').value) : null
      });
    } 
    else if (selectedAssetType === 'amazonOption'){
      STATUS_URL = `${EDGE_CONNECTOR.ADDRESS}:${EDGE_CONNECTOR.PORT}/kit/basic/create/aws`;
      Object.assign(data, {
        asset_type: "aws",
        storage_url: document.getElementById('bucketURL').value,
        bucket_name: document.getElementById('bucketName').value,
        storage_region: document.getElementById('bucketRegion').value,
        object_path: document.getElementById('objectPath').value,
        storage_username: document.getElementById('userName').value,
        storage_password: document.getElementById('userPassword').value
      });
    }

    try {
      // Use EDGE_CONNECTOR from config.js
      const response = await fetch(STATUS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`Request failed: ${response.status} - ${errorText}`);
      }

      const result = await response.json();
      alert('Asset created successfully!');
      } catch (error) {
        alert(`Error sending HTTP request: ${error.message}`);
        console.error(error);
      }
});
</script>
