<!--begin::App Content Header-->
<div class="app-content-header">
  <!--begin::Container-->
  <div class="container-fluid">
    <!--begin::Row-->
    <div class="row">
      <div class="col-sm-6">
        <h3 class="mb-0">My KITs (Assets)</h3>
      </div>
    </div>
    <!--end::Row-->
  </div>
  <!--end::Container-->
</div>

<!--end::App Content Header-->
<!--begin::App Content-->
<div class="app-content">
  <!--begin::Container-->
  <div class="container-fluid">
    <!--dynamic rendering part-->
    <div id="cardsContainer" class="row"></div>


  </div>
</div>

<!-- Modal for contract making overlay -->
<div class="modal fade" id="contractModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 id="contractModalTitle" class="modal-title">Create Contract</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Contract Name</label>
          <input type="text" class="form-control" id="contractName">
        </div>

        <div class="mb-3">
          <label class="form-label">Policy ID</label>
          <input type="text" class="form-control" id="policyId">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button class="btn btn-primary" id="submitContractBtn">
          Submit
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Modal asset detail showing -->
<div class="modal fade" id="viewJsonModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="viewJsonModalTitle">
          Asset JSON
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <textarea id="jsonViewer"
        class="form-control"
        style="height: 70vh; font-family: monospace; white-space: pre; overflow: auto;">
        </textarea>
      </div>

      <div class="modal-footer">
        <button id="editJsonBtn" class="btn btn-warning">Edit</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>

<!-- Optional: Confirmation modal -->
<div class="modal fade" id="confirmEditModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Warning</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Editing may cause unexpected errors. Are you sure you want to proceed?
      </div>
      <div class="modal-footer">
        <button id="confirmYes" class="btn btn-danger">Yes</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">No</button>
      </div>
    </div>
  </div>
</div>
