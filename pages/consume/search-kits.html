<!--begin::App Content Header-->
<div class="app-content-header">
  <!--begin::Container-->
  <div class="container-fluid">
    <!--begin::Row-->
    <div class="row">
      <div class="col-sm-6">
        <h3 class="mb-0">Search KITs</h3>
      </div>
    </div>
      <!--end::Row-->
  </div>
  <!--end::Container-->
</div>
  
<!--end::App Content Header-->
<!--begin::App Content-->
<div class="app-content">
  <!--begin::Container-->
  <div class="container-fluid">
    <!--dynamic rendering part-->
    <div class="row mb-3">
        <div class="col-md-12">
            <form id="search-form" class="d-flex">
                <div class="search">
                    <span class="search-icon material-symbols-outlined">search</span>
                    <input id="search-input" class="search-input" type="search" placeholder="Search">
                    <button type="submit" class="btn btn-outline-secondary ms-2 rounded-pill" data-bs-toggle="tooltip" data-bs-placement="top" title="Go search">
                        <i class="bi bi-arrow-right-circle"></i>
                    </button>
                    <button id="ai_assist" type="button" class="btn btn-outline-secondary ms-2 rounded-pill" data-bs-toggle="tooltip" data-bs-placement="top" title="AI assistance">
                        <i class="bi bi-robot"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-4">
      <div class="card-body table-responsive p-0">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th class="text-center" style="width: 100px;">Icon</th>
              <th class="text-center" style="width: 150px; padding-left: 10px;">KIT Name</th>
              <th class="text-center" style="width: 150px;">Semantic Model</th>
              <th class="text-center" style="width: 200px;">Provider</th>
              <th style="width: auto;">Description</th>
              <th class="text-center" style="width: 120px;">Actions</th>
            </tr>
          </thead>

          <tbody id="searchTable">
            <!-- Dynamically Created Table -->
          </tbody>

        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal asset detail showing -->
<div class="modal fade" id="viewJsonModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="viewJsonModalTitle">
          Asset JSON
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <pre id="jsonViewer"
             style="white-space: pre-wrap; word-break: break-word; max-height: 70vh;">
        </pre>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
      </div>

    </div>
  </div>
</div>
